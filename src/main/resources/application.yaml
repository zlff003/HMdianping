server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 使用环境变量覆盖敏感信息（若未设置则使用冒号后的默认值）
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
# AI 模型配置（密钥从环境变量读取）
ai:
  model:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model-name: ${AI_MODEL_NAME:qwen-turbo}  # 阿里云通义千问模型
    timeout: 60  # 请求超时时间（秒）
    max-retries: 1  # 最大重试次数
  embedding:
    model-name: text-embedding-v2
  rag:
    chunk-size: 500          # 每个文档分块的最大字符数
    chunk-overlap: 50        # 分块之间的重叠字符数
    top-k: 3                 # 每次检索返回最相关的 Top-K 个片段
    min-score: 0.5           # 最低相似度分数（低于此值不注入 Prompt）
    knowledge-dir: classpath:knowledge/  # 知识库文档目录
  # MCP Server 配置 (Standard Anthropic MCP Java SDK)
  mcp:
    server:
      enabled: true
      transport: sse        # sse | stdio（标准 MCP 传输协议）
      sse-endpoint: /mcp/sse         # SSE 连接端点
      message-endpoint: /mcp/message # JSON-RPC 消息端点
